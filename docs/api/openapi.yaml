openapi: 3.1.0
info:
  title: Code Readiness Template API
  description: A Codex-native FastAPI template repo used to exercise code-readiness
    sections.
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Healthcheck
      operationId: healthcheck_healthz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Healthcheck Healthz Get
  /readyz:
    get:
      summary: Readiness
      operationId: readiness_readyz_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Readiness Readyz Get
  /api/v1/widgets:
    get:
      tags:
      - widgets
      summary: List Widgets
      operationId: list_widgets_api_v1_widgets_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/WidgetRead'
                type: array
                title: Response List Widgets Api V1 Widgets Get
    post:
      tags:
      - widgets
      summary: Create Widget
      operationId: create_widget_api_v1_widgets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WidgetCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WidgetRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/widgets/{widget_id}:
    get:
      tags:
      - widgets
      summary: Get Widget
      operationId: get_widget_api_v1_widgets__widget_id__get
      parameters:
      - name: widget_id
        in: path
        required: true
        schema:
          type: integer
          title: Widget Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WidgetRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    WidgetCreate:
      properties:
        name:
          type: string
          title: Name
      type: object
      required:
      - name
      title: WidgetCreate
    WidgetRead:
      properties:
        id:
          type: integer
          title: Id
        name:
          type: string
          title: Name
        slug:
          type: string
          title: Slug
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - name
      - slug
      - created_at
      title: WidgetRead
