repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format-check
        name: ruff-format-check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
      - id: ty-check
        name: ty-check
        entry: uv run ty check src tests scripts
        language: system
        pass_filenames: false
      - id: large-file-check
        name: large-file-check
        entry: uv run python scripts/check-large-files.py
        language: system
        pass_filenames: false
