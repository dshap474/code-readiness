services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-code_readiness}
      POSTGRES_USER: ${POSTGRES_USER:-code_readiness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-code_readiness}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-code_readiness} -d ${POSTGRES_DB:-code_readiness}"]
      interval: 5s
      retries: 10
      timeout: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
