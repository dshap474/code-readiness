name: codex-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head
      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: workspace-write
      - name: Publish review artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-pr-review
          path: codex-output.md
  post-feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    steps:
      - name: Publish PR review summary
        run: |
          mkdir -p dist/review
          cat <<'EOF' > dist/review/pr-review-summary.md
          # Automated PR Review

          - Reviewer: Codex
          - Trigger: pull_request opened, synchronized, or reopened
          - Coverage: correctness, regressions, missing tests, and security risks
          - Delivery: pull request comment plus uploaded artifact
          EOF
      - name: Post Codex feedback
        uses: actions/github-script@v9
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
      - name: Upload PR review summary
        uses: actions/upload-artifact@v7
        with:
          name: pr-review-summary
          path: dist/review/pr-review-summary.md
