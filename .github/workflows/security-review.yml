name: security-review

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  dast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
      - name: Sync dependencies
        run: uv sync --dev --frozen
      - name: Prepare environment
        run: cp .env.example .env
      - name: Start Postgres
        run: docker compose up -d postgres
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Start API
        run: |
          uv run uvicorn code_readiness_template.app:app --host 0.0.0.0 --port 8000 &
          echo $! > uvicorn.pid
          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/readyz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Run ZAP baseline
        run: |
          docker run --rm --network host ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://127.0.0.1:8000 -I
      - name: Cleanup
        if: always()
        run: |
          if [[ -f uvicorn.pid ]]; then
            kill "$(cat uvicorn.pid)" || true
          fi
          docker compose down --remove-orphans
